<div class="page-container">
  <app-page-header [title]="pageTitle" [subtitle]="isEdit ? '修改角色基本信息' : '填写角色基本信息'">
    <a routerLink="/system/roles">返回列表</a>
  </app-page-header>

  <nz-card class="page-card form-page-card" [nzLoading]="loading">
    <form nz-form [formGroup]="form" nzLayout="vertical" class="form-page">
      <div class="form-page-grid">
        <nz-form-item>
          <nz-form-label nzRequired>角色编码</nz-form-label>
          <nz-form-control nzErrorTip="请输入角色编码">
            <input nz-input formControlName="roleCode" placeholder="如 admin" [readonly]="isEdit" />
          </nz-form-control>
        </nz-form-item>
        <nz-form-item>
          <nz-form-label nzRequired>角色名称</nz-form-label>
          <nz-form-control nzErrorTip="请输入角色名称">
            <input nz-input formControlName="roleName" placeholder="如 管理员" />
          </nz-form-control>
        </nz-form-item>
        <nz-form-item class="form-page-full">
          <nz-form-label>描述</nz-form-label>
          <nz-form-control>
            <textarea nz-input formControlName="description" placeholder="可选" rows="3"></textarea>
          </nz-form-control>
        </nz-form-item>
        @if (isEdit) {
          <nz-form-item>
            <nz-form-label>启用</nz-form-label>
            <nz-form-control>
              <nz-switch formControlName="isActive"></nz-switch>
            </nz-form-control>
          </nz-form-item>
        }
      </div>

      <div class="form-page-actions">
        <nz-space>
          <button *nzSpaceItem nz-button nzType="primary" [nzLoading]="saving" (click)="submit()">保存</button>
          <a *nzSpaceItem nz-button routerLink="/system/roles">取消</a>
        </nz-space>
      </div>
    </form>
  </nz-card>
</div>
